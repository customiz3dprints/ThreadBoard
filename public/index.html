<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreadBoard</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>
</head>
<body id="body" style="user-select: none;">
    <header id="header">
        <div id="infodiv">
            <span>Thread Board</span>
            <span><a href="contact.html" class="nodecorLink">Contact</a></span>
        </div>
        <br>
        <div id="controlDiv">
            <span>Title:</span> <span id="boardTitle" contenteditable="true">New Board</span>
                <div id="buttonDiv">
                    <button class="Button" onclick="resetBoard(); window.location.reload();">Reset board</button>
                    <button class="Button" onclick="exportBoard()">Export board as JSON</button>
                    Import board from JSON:<input id="importJSON" type="file" accept="application/json" class="Button">
                </div>
        </div>
        
    </header>
    
    
    <ul id="contextMenu" hidden>
        <li id="newNote" class="menuElement" onclick="menuNote()">New Note</li>
        <li id="deleteNote" class="menuElement" onclick="menuDelete()" hidden>Delete Note</li>
        <li id="deleteString" class="menuElement" onclick="menuDeleteString()" hidden>Delete String</li>
        <li id="setColor" class="menuElement" onclick="menuColor()" hidden>Set Color (same selector)</li>
        <li id="setColorText" class="menuElement" onclick="menuColorText()" hidden>Set Color of content (same selector)</li>
        <input type="color" name="setColor" id="noteColor" value="#d2b48c" hidden>
        <li id="close" class="menuElement" onclick="document.getElementById('contextMenu').hidden = true;"> Close menu </li>
    </ul>
</body>
</html>
